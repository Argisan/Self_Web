<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argi Studio | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="admin-shell">

    <!-- Login gate -->
    <section class="admin-login-card" id="adminLoginCard">
      <div class="admin-brand">
        <p class="eyebrow">Owner access</p>
        <h1>License Key Admin</h1>
        <p>Enter the admin password to manage license keys.</p>
      </div>
      <form id="adminLoginForm" class="admin-login-form" autocomplete="off">
        <div class="admin-field">
          <label for="adminPassword">Admin password</label>
          <input type="password" id="adminPassword" name="adminPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="primary-btn" id="adminLoginBtn">Sign in</button>
        <p class="admin-message" id="adminLoginMessage" role="status" aria-live="polite"></p>
      </form>
    </section>

    <!-- Dashboard (hidden until logged in) -->
    <section class="admin-dashboard is-hidden" id="adminDashboard">
      <header class="admin-header">
        <div>
          <p class="eyebrow">License key management</p>
          <h1>Admin Panel</h1>
        </div>
        <button type="button" class="ghost-btn" id="adminLogoutBtn">Sign out</button>
      </header>

      <div class="admin-stats" id="adminStats">
        <div class="admin-stat-card">
          <strong id="statTotal">—</strong>
          <span>total keys</span>
        </div>
        <div class="admin-stat-card">
          <strong id="statActive">—</strong>
          <span>active keys</span>
        </div>
        <div class="admin-stat-card">
          <strong id="statInUse">—</strong>
          <span>in use now</span>
        </div>
        <div class="admin-stat-card">
          <strong id="statExpired">—</strong>
          <span>expired</span>
        </div>
      </div>

      <div class="admin-panels">
        <!-- Create key panel -->
        <article class="admin-card">
          <h3>Create new key</h3>
          <form id="createKeyForm" class="create-key-form" autocomplete="off">
            <div class="admin-field">
              <label for="newKeyLabel">Label <span class="field-hint">(optional)</span></label>
              <input type="text" id="newKeyLabel" name="newKeyLabel" placeholder="e.g. User A" maxlength="80">
            </div>
            <div class="admin-field">
              <label for="newKeyExpiry">Expiry date <span class="field-hint">(optional, leave blank for no expiry)</span></label>
              <input type="datetime-local" id="newKeyExpiry" name="newKeyExpiry">
            </div>
            <button type="submit" class="primary-btn">Generate key</button>
            <p class="admin-message" id="createKeyMessage" role="status" aria-live="polite"></p>
          </form>
        </article>

        <!-- Keys list -->
        <article class="admin-card admin-card-wide">
          <div class="keys-header">
            <h3>License keys</h3>
            <button type="button" class="ghost-btn small-btn" id="refreshKeysBtn">Refresh</button>
          </div>
          <p class="admin-message" id="keysMessage" role="status" aria-live="polite"></p>
          <div id="keysList" class="keys-list">
            <p class="keys-empty">Loading keys…</p>
          </div>
        </article>
      </div>
    </section>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
