<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced NF Cookie Checker | Argi Studio</title>
  <meta name="description" content="Bulk Netflix cookie checker - Argi Studio">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=VT323&display=swap');

    :root {
      --neon-purple: #c026d3;
      --neon-cyan: #22d3ee;
      --neon-pink: #f472b6;
    }

    * { box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Sora', sans-serif;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      position: relative;
    }

    #cyberCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.85;
    }

    .nfcc-shell {
      position: relative;
      z-index: 2;
      max-width: 1280px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      perspective: 1200px;
    }

    .header .eyebrow {
      display: inline-block;
      background: linear-gradient(90deg, #c026d3, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;                    /* ← Fixed warning */
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      letter-spacing: 6px;
      font-size: 1.1rem;
      animation: glitch-text 4s infinite linear;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 700;
      background: linear-gradient(90deg, #c026d3, #22d3ee, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;                    /* ← Fixed warning */
      -webkit-text-fill-color: transparent;
      text-shadow: 
        0 0 20px #c026d3,
        0 0 40px #22d3ee;
      transform: rotateX(12deg);
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .header h1:hover {
      transform: rotateX(-8deg) scale(1.05);
    }

    .license-box, .input-card {
      background: rgba(15, 15, 25, 0.75);
      border: 2px solid transparent;
      border-image: linear-gradient(45deg, #c026d3, #22d3ee) 1;
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 40px;
      box-shadow: 
        0 0 40px rgba(192, 38, 211, 0.4),
        0 25px 50px -12px rgb(0 0 0 / 0.4);
      backdrop-filter: blur(16px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      transform: perspective(1000px) rotateX(8deg) rotateY(4deg);
    }

    .license-box:hover, .input-card:hover {
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(-8px);
      box-shadow: 
        0 0 60px rgba(192, 38, 211, 0.7),
        0 35px 60px -12px rgb(0 0 0 / 0.5);
    }

    .glass-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(192, 38, 211, 0.3);
      color: white;
      border-radius: 18px;
      padding: 18px 24px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    .glass-input:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.3);
      transform: scale(1.03);
    }

    .bulk-textarea {
      background: rgba(15,15,25,0.9);
      border: 2px solid #6b46c1;
      border-radius: 24px;
      color: #fff;
      font-family: 'VT323', monospace;
      font-size: 1.05rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 220px;
      padding: 24px;
      box-shadow: inset 0 0 30px rgba(192, 38, 211, 0.2);
    }

    .start-btn {
      position: relative;
      background: linear-gradient(90deg, #7e22ce, #c026d3, #22d3ee);
      color: white;
      font-weight: 700;
      font-size: 1.5rem;
      padding: 22px 80px;
      border-radius: 9999px;
      box-shadow: 
        0 0 40px #c026d3,
        0 0 80px #22d3ee,
        0 25px 50px -12px rgb(192 38 211);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 3px;
      transform: perspective(800px) rotateX(12deg);
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 40%;
      height: 300%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent
      );
      transform: skewX(-25deg);
      animation: shimmer 4s linear infinite;
    }

    .start-btn:hover {
      transform: perspective(800px) rotateX(-12deg) scale(1.12) translateY(-6px);
      box-shadow: 
        0 0 70px #c026d3,
        0 0 120px #22d3ee;
    }

    .start-btn:active {
      transform: scale(0.95);
    }

    .scanning {
      animation: scanPulse 1.8s ease-in-out infinite;
    }

    @keyframes scanPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .result-item {
      background: linear-gradient(145deg, #161b22, #1f2937);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid #6b46c1;
      box-shadow: 0 10px 30px -10px #c026d3;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transform: perspective(1200px) rotateY(8deg);
    }

    .result-item:hover {
      transform: perspective(1200px) rotateY(0deg) translateY(-12px) scale(1.03);
      box-shadow: 0 25px 50px -12px #c026d3;
    }

    .status-success { 
      animation: successPop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
    }

    @keyframes successPop {
      0% { transform: scale(0.6) rotate(12deg); }
      70% { transform: scale(1.2) rotate(-8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .glitch {
      animation: glitch 1.2s infinite linear alternate;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 #c026d3, -2px 0 #22d3ee; }
      100% { text-shadow: -2px 0 #c026d3, 2px 0 #22d3ee; }
    }

    .progress-bar {
      height: 6px;
      background: #1f2937;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #c026d3, #22d3ee);
      animation: progressSweep 1.6s linear infinite;
    }

    @keyframes progressSweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .footer-link {
      transition: all 0.3s ease;
    }
    .footer-link:hover {
      transform: translateY(-3px) rotate(8deg);
      color: #22d3ee !important;
    }
  </style>
</head>
<body>
  <canvas id="cyberCanvas"></canvas>

  <div class="nfcc-shell">
    <div class="header">
      <p class="eyebrow glitch">ARGI STUDIO • SECRET VAULT</p>
      <h1>NF COOKIE CHECKER</h1>
      <p class="text-xl text-violet-300 mt-3 tracking-[4px] flex items-center justify-center gap-3">
        <span class="inline-block w-3 h-3 bg-[#22d3ee] rounded-full animate-pulse"></span>
        BULK • 3D • REAL-TIME • PROXY PROTECTED
        <span class="inline-block w-3 h-3 bg-[#c026d3] rounded-full animate-pulse"></span>
      </p>
    </div>

    <div class="license-box">
      <label class="block text-sm font-bold mb-4 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">
        LICENSE KEY <span class="text-red-400">*</span>
      </label>
      <input type="text" id="licenseKey" class="glass-input w-full text-lg placeholder:text-violet-400 focus:ring-4 focus:ring-cyan-400/30"
             placeholder="LK-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" maxlength="80" required>
    </div>

    <div class="input-card">
      <label class="block text-sm font-bold mb-4 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">
        PASTE COOKIES (ANY FORMAT)
      </label>
      <textarea id="bulkInput" class="bulk-textarea w-full" rows="8"
                placeholder="Drop JSON • Netscape • Raw cookies • HTTP headers here..."></textarea>
    </div>

    <div class="text-center mb-12">
      <button onclick="startChecking()" id="startBtn" class="start-btn">
        <span id="btnText">START CHECKING</span>
      </button>
    </div>

    <div id="resultsCard" class="hidden mt-10">
      <div class="flex justify-between items-center mb-8 border-b border-violet-900/50 pb-6">
        <h3 class="text-3xl font-bold tracking-wider flex items-center gap-4">
          <span class="text-emerald-400">LIVE SCAN</span>
          <div class="progress-bar w-64"><div></div></div>
        </h3>
        <span id="progressText" class="font-mono text-emerald-400 text-xl"></span>
      </div>
      <div id="resultsList" class="space-y-8"></div>
    </div>

    <div class="text-center mt-16">
      <a href="home.html" class="footer-link text-violet-400 hover:text-cyan-400 inline-flex items-center gap-3 text-lg">
        ← BACK TO PORTFOLIO VAULT
      </a>
    </div>
  </div>

  <script>
    // (All the 3D canvas, tilt, parser, and checker code is the same as before)
    const canvas = document.getElementById('cyberCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 0.5;
        this.speedX = Math.random() * 1.5 - 0.75;
        this.speedY = Math.random() * 1.5 - 0.75;
        this.hue = Math.random() > 0.5 ? 290 : 190;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `hsla(${this.hue}, 100%, 75%, 0.9)`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 75%)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 220; i++) particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 110) {
            ctx.strokeStyle = `hsla(${particles[i].hue}, 100%, 75%, ${1 - distance / 110})`;
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animateParticles);
    }

    function add3DTilt() {
      const shell = document.querySelector('.nfcc-shell');
      shell.addEventListener('mousemove', (e) => {
        const rect = shell.getBoundingClientRect();
        const rotateX = (e.clientY - rect.top - rect.height / 2) / 18;
        const rotateY = (rect.width / 2 - (e.clientX - rect.left)) / 18;
        shell.style.transition = 'transform 0.1s ease';
        shell.style.transform = `perspective(1400px) rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
      });
      shell.addEventListener('mouseleave', () => {
        shell.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        shell.style.transform = 'perspective(1400px) rotateX(0deg) rotateY(0deg)';
      });
    }

    function parseMixedInput(text) {
      let extracted = [];
      let startIndex = 0;
      while ((startIndex = text.indexOf('[', startIndex)) !== -1) {
        let endIndex = startIndex;
        while ((endIndex = text.indexOf(']', endIndex + 1)) !== -1) {
          let potential = text.substring(startIndex, endIndex + 1);
          try {
            if (Array.isArray(JSON.parse(potential))) {
              extracted.push(potential.trim());
              text = text.substring(0, startIndex) + " ".repeat(potential.length) + text.substring(endIndex + 1);
              break;
            }
          } catch (e) {}
        }
        if (!extracted.length || extracted[extracted.length-1] !== potential) startIndex++;
      }
      text = text.replace(/\|/g, '\n');
      const lines = text.split(/\r?\n/);
      let currentNetscape = [];
      let seenKeys = new Set();
      lines.forEach(line => {
        let trimmed = line.trim();
        if (!trimmed || trimmed === ';') {
          if (currentNetscape.length) extracted.push(currentNetscape.join('\n'));
          currentNetscape = [];
          seenKeys.clear();
          return;
        }
        if (trimmed.endsWith(';')) trimmed = trimmed.slice(0, -1).trim();
        if (trimmed.includes('.netflix.com')) {
          let parts = trimmed.split(/\s+/);
          if (parts.length >= 6) {
            let keyName = parts[5];
            if (seenKeys.has(keyName)) {
              extracted.push(currentNetscape.join('\n'));
              currentNetscape = [];
              seenKeys.clear();
            }
            seenKeys.add(keyName);
          }
          currentNetscape.push(trimmed);
        } else if (trimmed.includes('NetflixId=') || trimmed.includes('SecureNetflixId=')) {
          if (currentNetscape.length) extracted.push(currentNetscape.join('\n'));
          currentNetscape = [];
          seenKeys.clear();
          extracted.push(trimmed);
        }
      });
      if (currentNetscape.length) extracted.push(currentNetscape.join('\n'));
      return extracted;
    }

    async function startChecking() {
      const licenseKey = document.getElementById('licenseKey').value.trim();
      const rawText = document.getElementById('bulkInput').value.trim();

      if (!licenseKey) return alert("⚠️ Paste your License Key");
      if (!rawText) return alert("⚠️ Paste some cookies");

      const startBtn = document.getElementById('startBtn');
      const btnText = document.getElementById('btnText');
      startBtn.disabled = true;
      btnText.innerHTML = `<span class="scanning">CHECKING...</span>`;

      const cookies = parseMixedInput(rawText);
      if (cookies.length === 0) {
        alert("No valid cookies detected");
        startBtn.disabled = false;
        btnText.textContent = "START CHECKING";
        return;
      }

      document.getElementById('resultsCard').classList.remove('hidden');
      document.getElementById('resultsList').innerHTML = '';

      for (let i = 0; i < cookies.length; i++) {
        document.getElementById('progressText').innerHTML = `<span class="inline-flex items-center gap-2"><span class="animate-spin w-4 h-4 border-2 border-cyan-400 border-t-transparent rounded-full"></span> ${i+1} / ${cookies.length}</span>`;
        try {
          const res = await fetch('/api/nftoken', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ licenseKey, cookie: cookies[i] })
          });
          const data = await res.json();
          renderResult(data, res.status);
        } catch (e) {
          renderResult({ status: 'ERROR', message: 'Connection error' }, 500);
        }
      }

      document.getElementById('progressText').innerHTML = `<span class="text-emerald-400 text-2xl">✅ ALL ${cookies.length} COOKIES SCANNED</span>`;
      startBtn.disabled = false;
      btnText.textContent = "START CHECKING";
    }

    function renderResult(data, httpCode) {
      let html = '';
      if (data.status === 'SUCCESS' || httpCode === 200) {
        const plan = data.x_tier || 'Unknown';
        const premiumClass = plan.includes('Premium') ? 'text-emerald-400' : 'text-blue-400';
        html = `
          <div class="result-item status-success">
            <div class="flex items-center gap-4 mb-6">
              <span class="px-6 py-2 rounded-3xl bg-emerald-500/20 text-emerald-400 text-sm font-bold tracking-widest">LIVE ACCOUNT</span>
              <span class="font-bold text-2xl">${data.x_mail || 'Netflix Account'}</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 text-sm">
              <div><strong class="text-violet-300">PLAN</strong><br><span class="${premiumClass}">${plan}</span></div>
              <div><strong class="text-violet-300">COUNTRY</strong><br>${data.x_loc || '—'}</div>
              <div><strong class="text-violet-300">RENEWAL</strong><br>${data.x_ren || '—'}</div>
              <div><strong class="text-violet-300">MEMBER SINCE</strong><br>${data.x_mem || '—'}</div>
              <div><strong class="text-violet-300">PAYMENT</strong><br>${data.x_bil || '—'}</div>
              <div><strong class="text-violet-300">PROFILES</strong><br>${data.x_usr || '—'}</div>
            </div>
            <div class="flex gap-4 mt-8">
              <a href="${data.x_l1 || '#'}" target="_blank" class="flex-1 text-center py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-400 font-bold hover:brightness-110 transition">PC →</a>
              <a href="${data.x_l2 || '#'}" target="_blank" class="flex-1 text-center py-4 rounded-2xl bg-gradient-to-r from-blue-500 to-cyan-400 font-bold hover:brightness-110 transition">MOBILE →</a>
              <a href="${data.x_l3 || '#'}" target="_blank" class="flex-1 text-center py-4 rounded-2xl bg-gradient-to-r from-amber-500 to-pink-400 font-bold hover:brightness-110 transition">TV →</a>
            </div>
          </div>`;
      } else if (httpCode === 429) {
        html = `<div class="result-item"><span class="px-6 py-2 rounded-3xl bg-amber-400/20 text-amber-400 text-sm font-bold">RATE LIMITED</span><p class="mt-4 text-gray-400">${data.message || 'Try again soon'}</p></div>`;
      } else {
        html = `<div class="result-item"><span class="px-6 py-2 rounded-3xl bg-red-400/20 text-red-400 text-sm font-bold">DEAD</span><p class="mt-4 text-gray-400">${data.message || 'Invalid cookie'}</p></div>`;
      }
      document.getElementById('resultsList').insertAdjacentHTML('beforeend', html);
    }

    window.onload = function() {
      resizeCanvas();
      initParticles();
      animateParticles();
      window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
      add3DTilt();
    };
  </script>
</body>
</html>
