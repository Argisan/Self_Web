<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Library</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
        .card {
            background-color: purple;
            box-shadow: 0 0 10px 5px rgba(128, 0, 128, 0.5);
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Account Management</h1>
        <form id="authForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="message" class="hidden"></div>
    </div>
    <script>
        const authForm = document.getElementById('authForm');
        const messageDiv = document.getElementById('message');

        authForm.onsubmit = function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Authentication check
            authenticateUser(username, password);
        };

        function authenticateUser(username, password) {
            // Check localStorage
            const storedUser = localStorage.getItem('user');
            if (storedUser) {
                const user = JSON.parse(storedUser);
                if (user.username === username && user.password === password) {
                    messageDiv.textContent = 'Welcome, ' + username + '!';
                    messageDiv.classList.remove('hidden');
                } else {
                    fetch('https://api.example.com/auth', {  // Replace with actual API URL
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Save user to localStorage
                            localStorage.setItem('user', JSON.stringify({ username }));
                            messageDiv.textContent = 'Welcome, ' + username + '!';
                            messageDiv.classList.remove('hidden');
                        } else {
                            messageDiv.textContent = 'Invalid credentials';
                            messageDiv.classList.remove('hidden');
                        }
                    });
                }
            } else {
                // If no user in localStorage, check API
                fetch('https://api.example.com/auth', {  // Replace with actual API URL
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Save user to localStorage
                        localStorage.setItem('user', JSON.stringify({ username }));
                        messageDiv.textContent = 'Welcome, ' + username + '!';
                        messageDiv.classList.remove('hidden');
                    } else {
                        messageDiv.textContent = 'Invalid credentials';
                        messageDiv.classList.remove('hidden');
                    }
                });
            }
        }
    </script>
</body>
</html>
