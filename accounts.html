<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Accounts</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
        .card {
            background-color: #2c2c2c;
            border-radius: 10px;
            box-shadow: 0 0 20px purple;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px purple;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        @media (max-width: 600px) {
            .gallery {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>Account Gallery</h1>
    <div class="gallery">
        <!-- Example card - loop through accounts here -->
        <div class="card" onclick="showDetails('Account1')">
            <h2>Account 1</h2>
            <p>Account details...</p>
            <button onclick="deleteAccount('Account1')">Delete</button>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="cursor:pointer;">&times;</span>
            <h2 id="accountTitle"></h2>
            <p id="accountDetails"></p>
        </div>
    </div>
    <script>
        function showDetails(account) {
            // Fetch account details and display in modal
            document.getElementById('accountTitle').innerText = account;
            document.getElementById('accountDetails').innerText = 'Details for ' + account;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function deleteAccount(account) {
            if(confirm('Are you sure you want to delete ' + account + '?')) {
                // Implement delete functionality here
                alert(account + ' deleted.');
            }
        }

        // Authentication check
        // Example: if (!isAuthenticated()) { alert('Please log in.'); }
    </script>
</body>
</html>
